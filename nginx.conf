events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Оптимизация
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # API проксирование на Go backend (ДОЛЖНО БЫТЬ ПЕРВЫМ!)
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS для API
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-vk-sign, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            # Обработка preflight запросов
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-vk-sign, X-Requested-With" always;
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        # VK Mini App - SPA с fallback на index.html
        location /vk_app/ {
            alias /usr/share/nginx/html/vk_app/;
            try_files $uri $uri/ /vk_app/index.html;
            
            # Разрешаем загрузку в iframe для VK - максимально открытые настройки
            add_header X-Frame-Options "ALLOWALL" always;
            # Убираем CSP - пусть VK сам управляет политиками
            
            # CORS для VK
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, x-vk-sign" always;
            
            # Кеширование статических ресурсов
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                # Повторяем заголовки для статических файлов
                add_header X-Frame-Options "ALLOWALL" always;
            }
        }

        # Альтернативный endpoint для VK Mini App без CSP ограничений (для проблемных случаев)
        location /vk_app_embed/ {
            alias /usr/share/nginx/html/vk_app/;
            try_files $uri $uri/ /vk_app/index.html;
            
            # Максимально открытые настройки для iframe
            add_header X-Frame-Options "ALLOWALL" always;
            # Убираем CSP полностью для этого endpoint
            
            # CORS для VK
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, x-vk-sign" always;
        }

        # Админка - прямые маршруты
        location = / {
            try_files /index.html =404;
        }
        
        location = /dashboard {
            try_files /pages/dashboard.html =404;
        }
        
        location = /auth {
            try_files /pages/vk-connect.html =404;
        }
        
        location = /vk-connect {
            try_files /pages/vk-connect.html =404;
        }
        
        location = /groups {
            try_files /pages/groups.html =404;
        }
        
        location = /posts {
            try_files /pages/posts.html =404;
        }
        
        location = /settings {
            try_files /pages/settings.html =404;
        }
        
        location = /users {
            try_files /pages/users.html =404;
        }

        # Статические ресурсы админки
        location ~* ^/(css|js|templates|pages)/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Остальные статические файлы
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|html)$ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Безопасность для админки
        location ~ ^/(dashboard|auth|vk-connect|groups|posts|settings|users|css|js|templates|pages)/ {
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }
    }
}