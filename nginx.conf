events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Оптимизация
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # API проксирование на Go backend
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # VK Mini App - SPA с fallback на index.html
        location /vk_app/ {
            alias /usr/share/nginx/html/vk_app/;
            try_files $uri $uri/ /vk_app/index.html;
            
            # Кеширование статических ресурсов
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Админка - SPA с fallback на соответствующие HTML файлы
        location / {
            try_files $uri $uri/ @fallback;
        }

        # Fallback для админки
        location @fallback {
            # Роутинг для админки
            if ($uri = "/") {
                rewrite ^.*$ /index.html last;
            }
            if ($uri = "/dashboard") {
                rewrite ^.*$ /pages/dashboard.html last;
            }
            if ($uri = "/auth") {
                rewrite ^.*$ /index.html last;
            }
            if ($uri = "/vk-connect") {
                rewrite ^.*$ /pages/vk-connect.html last;
            }
            if ($uri = "/groups") {
                rewrite ^.*$ /pages/groups.html last;
            }
            if ($uri = "/posts") {
                rewrite ^.*$ /pages/posts.html last;
            }
            if ($uri = "/settings") {
                rewrite ^.*$ /pages/settings.html last;
            }
            if ($uri = "/users") {
                rewrite ^.*$ /pages/users.html last;
            }
            
            # Если ничего не подошло, отдаем 404
            return 404;
        }

        # Кеширование статических ресурсов
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Безопасность
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}