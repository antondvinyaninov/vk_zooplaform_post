server {
    listen 80;
    server_name gw.zooplatforma.ru;

    client_max_body_size 100M;

    location / {
        proxy_pass http://vk.zooplatforma.ru;
        proxy_set_header Host vk.zooplatforma.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /s3/ {
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass https://s3.firstvds.ru;
        proxy_set_header Host s3.firstvds.ru;
        proxy_ssl_server_name on;
    }
}
