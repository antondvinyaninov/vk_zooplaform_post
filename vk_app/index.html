<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />
    <title>PetPlatform</title>
    <script src="/vk-bridge.min.js"></script>
    <script>
      // Отладочная информация
      console.log('VK Bridge available:', typeof vkBridge !== 'undefined');
      console.log('Current URL:', window.location.href);
      console.log('User Agent:', navigator.userAgent);
      
      // Безопасная инициализация VK Bridge
      try {
        if (typeof vkBridge !== 'undefined' && vkBridge.send) {
          console.log('Initializing VK Bridge...');
          vkBridge.send('VKWebAppInit').then(function() {
            console.log('VK Bridge initialized successfully');
          }).catch(function(error) {
            console.warn('VK Bridge init failed:', error);
          });
        } else {
          console.warn('VK Bridge not available - running outside VK environment');
        }
      } catch (error) {
        console.error('VK Bridge initialization error:', error);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
