<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Авторизация</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Авторизация VK</h1>
        
        <div class="card">
            <h2>Быстрая авторизация</h2>
            <p>Используйте сервисный ключ приложения для доступа к VK API</p>
            <button id="autoServiceKeyBtn" class="btn">Авторизоваться автоматически</button>
            <div id="serviceKeyResult" class="result"></div>
        </div>

        <div class="card">
            <h2>Или введите токен вручную</h2>
            <p>Если у вас есть токен доступа VK API:</p>
            <div class="form-group">
                <input type="text" id="manualTokenInput" placeholder="Вставьте токен доступа" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
            </div>
            <button id="manualTokenBtn" class="btn">Использовать токен</button>
            <div id="manualTokenResult" class="result"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
