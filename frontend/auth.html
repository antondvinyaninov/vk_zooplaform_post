<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Авторизация</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@vkid/sdk@2.6.5/dist-sdk/umd/index.js"></script>
</head>
<body>
    <div class="container">
        <h1>Авторизация VK</h1>
        
        <div class="card">
            <h2>Войти через VK ID</h2>
            <p>Нажмите кнопку ниже для авторизации</p>
            
            <!-- Контейнер для кнопки VK ID -->
            <div id="vk-auth-button"></div>
            
            <div id="tokenResult" class="result"></div>
        </div>

        <div class="card">
            <h2>Или используйте готовый токен</h2>
            <p>Если у вас уже есть токен доступа:</p>
            <a href="index.html" class="btn" style="display: inline-block; text-decoration: none;">Перейти к панели управления</a>
        </div>
    </div>

    <script src="auth-vkid.js"></script>
</body>
</html>
