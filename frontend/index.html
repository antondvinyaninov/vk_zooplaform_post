<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK ZooPlatforma - Вход</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --vkui-background: #edeef0;
            --vkui-surface: #ffffff;
            --vkui-text-primary: #000000;
            --vkui-text-secondary: #6d7885;
            --vkui-separator: #dce1e6;
            --vkui-accent: #2688eb;
            --vkui-accent-hover: #1f7ad1;
            --vkui-shadow: 0 8px 24px rgba(0, 16, 61, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--vkui-background);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--vkui-text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
            padding: 20px;
        }
        
        .login-container {
            background: var(--vkui-surface);
            border-radius: 14px;
            border: 1px solid var(--vkui-separator);
            box-shadow: var(--vkui-shadow);
            width: min(560px, 100%);
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 28px 24px 18px;
        }
        
        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 14px;
            border-radius: 50%;
            background: rgba(38, 136, 235, 0.12);
            color: var(--vkui-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 700;
        }
        
        .title {
            font-size: 28px;
            line-height: 32px;
            font-weight: 700;
            margin: 0;
        }
        
        .subtitle {
            margin: 10px 0 0;
            color: var(--vkui-text-secondary);
            font-size: 15px;
            line-height: 21px;
        }

        .content {
            border-top: 1px solid var(--vkui-separator);
            padding: 20px;
        }

        .form-group {
            margin-bottom: 12px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: var(--vkui-text-secondary);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            border: 1px solid var(--vkui-separator);
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            background: #fff;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--vkui-accent);
        }
        
        .login-btn {
            background: var(--vkui-accent);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            width: 100%;
            margin-bottom: 16px;
        }
        
        .login-btn:hover {
            background: var(--vkui-accent-hover);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            border-radius: 10px;
            border: 1px solid var(--vkui-separator);
            background: #f7f8fa;
            color: var(--vkui-text-secondary);
            font-size: 14px;
            line-height: 20px;
            padding: 12px;
            margin-bottom: 14px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.error {
            border-color: #f1c3c6;
            background: #fff1f1;
            color: #a2303a;
        }

        .status.success {
            border-color: #c8e8ce;
            background: #f1fbf3;
            color: #2f7c3f;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .secondary-btn {
            background: transparent;
            border: 1px solid var(--vkui-separator);
            color: var(--vkui-text-primary);
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <div class="logo">VK</div>
            <h1 class="title">VK ZooPlatforma</h1>
            <p class="subtitle">Центр управления зооплатформой в ВКонтакте</p>
        </div>

        <div class="content">
            <div id="authStatus" class="status"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">Логин</label>
                    <input id="username" class="form-input" type="text" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Пароль</label>
                    <input id="password" class="form-input" type="password" autocomplete="current-password" required>
                </div>
                <button id="loginBtn" class="login-btn" type="submit">Войти</button>
            </form>

            <div id="sessionActions" class="row" style="display:none;">
                <button id="openDashboardBtn" class="login-btn" style="margin-bottom:0;">Перейти в панель</button>
                <button id="logoutBtn" class="secondary-btn" type="button">Выйти</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const authStatus = document.getElementById('authStatus');
        const sessionActions = document.getElementById('sessionActions');
        const openDashboardBtn = document.getElementById('openDashboardBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        const validCredentials = {
            admin: 'admin123',
            user: 'user123'
        };

        window.addEventListener('DOMContentLoaded', () => {
            checkAuthStatus();
        });

        function showStatus(message, mode) {
            authStatus.className = 'status show ' + mode;
            authStatus.textContent = message;
        }

        function resetStatus() {
            authStatus.className = 'status';
            authStatus.textContent = '';
        }

        function checkAuthStatus() {
            const appUser = AppStorage.getItem('app_user');
            const authTime = AppStorage.getItem('app_auth_time');
            const isValidSession = appUser && authTime && (Date.now() - parseInt(authTime, 10)) < 24 * 60 * 60 * 1000;

            if (isValidSession) {
                showStatus(`Вы уже вошли как ${appUser}`, 'success');
                loginForm.style.display = 'none';
                sessionActions.style.display = 'flex';
                return;
            }

            loginForm.style.display = 'block';
            sessionActions.style.display = 'none';
            resetStatus();
        }

        function performLogin() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showStatus('Заполните логин и пароль', 'error');
                return;
            }

            if (!validCredentials[username] || validCredentials[username] !== password) {
                showStatus('Неверный логин или пароль', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Вход...';
            
            setTimeout(() => {
                AppStorage.setItem('app_user', username);
                AppStorage.setItem('app_auth_time', String(Date.now()));
                showStatus(`Вход выполнен. Добро пожаловать, ${username}`, 'success');
                window.location.href = '/dashboard';
            }, 500);
        }

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();
            performLogin();
        });

        openDashboardBtn.addEventListener('click', function () {
            window.location.href = '/dashboard';
        });

        logoutBtn.addEventListener('click', function () {
            AppStorage.removeItem('app_user');
            AppStorage.removeItem('app_auth_time');
            checkAuthStatus();
        });
    </script>
</body>
</html>
