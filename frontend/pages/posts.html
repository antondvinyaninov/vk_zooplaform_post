<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Посты - VK ZooPlatforma</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
    
    <!-- Общие стили VKUI -->
    <link rel="stylesheet" href="../css/vkui-base.css?v=20260422-2">
    
    <!-- Дополнительные стили для страницы постов -->
    <style>
        .posts-grid {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }
        
        .post-card {
            background: #ffffff;
            border: 1px solid #e7e8ec;
            border-radius: 8px;
            padding: 20px;
            transition: box-shadow 0.2s ease;
        }
        
        .post-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
        
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f2f3f5;
        }
        
        .post-date {
            color: #818c99;
            font-size: 13px;
        }
        
        .post-link {
            color: #5181b8;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        
        .post-link:hover {
            text-decoration: underline;
        }
        
        .post-text {
            color: #000000;
            line-height: 24px;
            margin-bottom: 16px;
            word-wrap: break-word;
        }
        
        .post-stats {
            display: flex;
            gap: 20px;
            padding-top: 12px;
            border-top: 1px solid #f2f3f5;
            color: #818c99;
            font-size: 13px;
        }
        
        .post-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            min-width: 150px;
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <div data-sidebar-root></div>

        <!-- Content -->
        <div class="content panel">
            <!-- Header -->
            <header class="header">
                <div class="header__content">
                    <div class="header__left">
                        <button type="button" class="header__menu-btn" aria-label="Открыть меню" onclick="toggleMobileSidebar()">☰</button>
                    </div>
                    <div class="header__center">
                        <h1 class="header__title">Посты</h1>
                    </div>
                    <div class="header__right">
                        <!-- Пустое место для будущих элементов -->
                    </div>
                </div>
            </header>

            <!-- Main content -->
            <main class="main">
                <div class="main__header">
                    <h1 class="main__title">Посты</h1>
                    <p class="main__subtitle">История публикаций и управление контентом в группах ВКонтакте.</p>
                </div>

                <!-- Filters -->
                <div class="card">
                    <div class="card__header">
                        <h2 class="card__title">Фильтры</h2>
                    </div>
                    <div class="card__content">
                        <div class="filters">
                            <div class="form-group">
                                <label class="form-label" for="groupFilter">Группа</label>
                                <select id="groupFilter" class="form-control filter-select">
                                    <option value="">Все группы</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label" for="dateFilter">Период</label>
                                <select id="dateFilter" class="form-control filter-select">
                                    <option value="">Все время</option>
                                    <option value="today">Сегодня</option>
                                    <option value="week">Неделя</option>
                                    <option value="month">Месяц</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label" for="statusFilter">Статус</label>
                                <select id="statusFilter" class="form-control filter-select">
                                    <option value="">Все статусы</option>
                                    <option value="published">Опубликовано</option>
                                    <option value="scheduled">Запланировано</option>
                                    <option value="draft">Черновик</option>
                                </select>
                            </div>
                        </div>
                        
                        <div style="display: flex; gap: 12px;">
                            <button id="loadPostsBtn" class="btn btn--primary">
                                📥 Загрузить посты
                            </button>
                            <button id="refreshBtn" class="btn btn--secondary">
                                🔄 Обновить
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Posts List -->
                <div class="card">
                    <div class="card__header">
                        <h2 class="card__title">История публикаций</h2>
                    </div>
                    <div class="card__content">
                        <div id="postsContainer" class="posts-grid">
                            <!-- Placeholder -->
                            <div class="placeholder">
                                <div class="placeholder__icon">📝</div>
                                <div class="placeholder__title">Посты не найдены</div>
                                <div class="placeholder__text">Загрузите посты из ваших групп или создайте новую публикацию</div>
                                <a href="/dashboard" class="btn btn--primary">
                                    Создать пост
                                </a>
                            </div>
                        </div>
                        
                        <div id="loadResult" class="result"></div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="section">
                    <h2 class="section__title">Статистика публикаций</h2>
                    <div class="section__content">
                        <div class="stats">
                            <div class="stat-card">
                                <div class="stat-value" id="totalPosts">0</div>
                                <div class="stat-label">Всего постов</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="todayPosts">0</div>
                                <div class="stat-label">Сегодня</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="scheduledPosts">0</div>
                                <div class="stat-label">Запланировано</div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Общие скрипты -->
    <script src="../js/utils.js"></script>
    <script src="../js/layout.js?v=20260422-1"></script>
    <script src="../js/sidebar.js?v=20260422-4"></script>
    <script src="../js/posts.js"></script>
</body>
</html>
