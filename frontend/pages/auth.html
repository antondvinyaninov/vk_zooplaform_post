<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Авторизация</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <h1>🔐 Авторизация VK</h1>
        
        <div class="card">
            <h2>Авторизация ВКонтакте</h2>
            <p>Получите доступ к вашим группам ВКонтакте</p>
            <button id="authBtn" class="btn">Авторизоваться ВКонтакте</button>
            
            <div id="manualTokenInput" style="display: none; margin-top: 20px;">
                <p>Вставьте URL из адресной строки после авторизации:</p>
                <textarea id="tokenUrlInput" 
                          rows="3" 
                          placeholder="https://oauth.vk.com/blank.html#access_token=..."
                          style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;"></textarea>
                <button id="saveTokenBtn" class="btn" style="margin-top: 10px;">Сохранить токен</button>
            </div>
            
            <div id="authResult" class="result"></div>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
