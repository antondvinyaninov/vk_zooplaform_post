<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи - VK ZooPlatforma</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">

    <link rel="stylesheet" href="../css/vkui-base.css?v=20260422-2">
    <style>
        .card,
        .card__content,
        .users-mobile-card,
        .users-mobile-row {
            overflow: visible;
        }

        .users-note {
            margin-bottom: 16px;
            color: #818c99;
            font-size: 14px;
            line-height: 20px;
        }

        .users-table-wrap {
            overflow-x: auto;
        }

        .users-desktop {
            display: block;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 720px;
        }

        .users-table th,
        .users-table td {
            border-bottom: 1px solid #e7e8ec;
            padding: 12px 8px;
            text-align: left;
            vertical-align: middle;
            font-size: 14px;
            line-height: 20px;
        }

        .users-table th {
            color: #818c99;
            font-weight: 500;
            font-size: 13px;
        }

        .vkui-custom-select {
            position: relative;
            min-width: 160px;
        }

        .vkui-custom-select__trigger {
            width: 100%;
            height: 36px;
            border: 1px solid #d7d8dc;
            border-radius: 8px;
            background: #ffffff;
            text-align: left;
            padding: 0 34px 0 12px;
            font-size: 14px;
            line-height: 20px;
            color: #000000;
            cursor: pointer;
            position: relative;
        }

        .vkui-custom-select__trigger::after {
            content: '▾';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #818c99;
            font-size: 12px;
            line-height: 1;
        }

        .vkui-custom-select.open .vkui-custom-select__trigger {
            border-color: #5181b8;
            box-shadow: 0 0 0 2px rgba(81, 129, 184, 0.12);
        }

        .vkui-custom-select__menu {
            position: absolute;
            left: 0;
            right: 0;
            top: calc(100% + 4px);
            background: #ffffff;
            border: 1px solid #d7d8dc;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            z-index: 2000;
            overflow: hidden;
            display: none;
        }

        .vkui-custom-select.open .vkui-custom-select__menu {
            display: block;
        }

        .vkui-custom-select__option {
            width: 100%;
            border: none;
            background: #ffffff;
            text-align: left;
            padding: 9px 12px;
            font-size: 14px;
            line-height: 20px;
            color: #000000;
            cursor: pointer;
        }

        .vkui-custom-select__option:hover {
            background: #f2f3f5;
        }

        .vkui-custom-select__option.active {
            background: #e3f2fd;
            color: #2a5885;
        }

        .users-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .users-mobile-list {
            display: none;
            margin-top: 12px;
        }

        .users-mobile-card {
            border: 1px solid #e7e8ec;
            border-radius: 12px;
            padding: 12px;
            background: #ffffff;
            margin-bottom: 10px;
        }

        .users-mobile-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .users-mobile-name {
            font-size: 15px;
            font-weight: 500;
            line-height: 20px;
        }

        .users-mobile-login {
            color: #818c99;
            font-size: 13px;
            line-height: 16px;
        }

        .users-mobile-row {
            display: grid;
            grid-template-columns: 96px 1fr;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }

        .users-mobile-label {
            color: #818c99;
            font-size: 13px;
            line-height: 16px;
        }

        .users-status {
            display: inline-flex;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            line-height: 16px;
            font-weight: 500;
        }

        .users-status--active {
            background: #e8f5e8;
            color: #2e7d32;
        }

        .users-status--invited {
            background: #fff3e0;
            color: #f57c00;
        }

        @media (max-width: 1024px) {
            .users-desktop {
                display: none;
            }

            .users-mobile-list {
                display: block;
            }

            .users-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div data-sidebar-root></div>

        <div class="content panel">
            <header class="header">
                <div class="header__content">
                    <div class="header__left">
                        <button type="button" class="header__menu-btn" aria-label="Открыть меню" onclick="toggleMobileSidebar()">☰</button>
                    </div>
                    <div class="header__center">
                        <h1 class="header__title">Пользователи</h1>
                    </div>
                    <div class="header__right"></div>
                </div>
            </header>

            <main class="main">
                <div class="main__header">
                    <h1 class="main__title">Управление пользователями</h1>
                    <p class="main__subtitle">Добавление пользователей в команду и назначение ролей доступа.</p>
                </div>

                <div class="card">
                    <div class="card__header">
                        <h2 class="card__title">Команда</h2>
                    </div>
                    <div class="card__content">
                        <p class="users-note">Сейчас это локальная демо-версия управления пользователями. На следующем этапе подключим серверную авторизацию с ролями.</p>
                        <div class="users-table-wrap users-desktop">
                            <table class="users-table">
                                <thead>
                                    <tr>
                                        <th>Пользователь</th>
                                        <th>Логин</th>
                                        <th>Роль</th>
                                        <th>Статус</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody id="usersTableBody"></tbody>
                            </table>
                        </div>
                        <div id="usersMobileList" class="users-mobile-list"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/layout.js?v=20260422-1"></script>
    <script src="../js/sidebar.js?v=20260422-4"></script>
    <script src="../js/users.js?v=20260422-3"></script>
</body>
</html>
