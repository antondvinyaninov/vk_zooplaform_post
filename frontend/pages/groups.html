<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Группы - VK ZooPlatforma</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
    
    <!-- Общие стили VKUI -->
    <link rel="stylesheet" href="../css/vkui-base.css?v=20260422-2">
    
    <!-- Дополнительные стили для страницы групп -->
    <style>
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        
        .group-card {
            border: 1px solid #e7e8ec;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background: #ffffff;
        }
        
        .group-card:hover {
            border-color: #5181b8;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
        
        .group-card.selected {
            border-color: #5181b8;
            background: #e3f2fd;
        }
        
        .group-card.selected::after {
            content: "✓";
            position: absolute;
            top: 12px;
            right: 12px;
            background: #5181b8;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        
        .group-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: block;
        }
        
        .group-name {
            font-weight: 500;
            margin-bottom: 8px;
            text-align: center;
            font-size: 14px;
            line-height: 20px;
        }
        
        .group-info {
            font-size: 13px;
            color: #818c99;
            text-align: center;
            line-height: 16px;
        }
        
        .selected-count {
            background: #5181b8;
            color: white;
            padding: 16px 20px;
            border-radius: 8px;
            text-align: center;
            margin: 24px 0;
            font-size: 14px;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <div data-sidebar-root></div>

        <!-- Content -->
        <div class="content panel">
            <!-- Header -->
            <header class="header">
                <div class="header__content">
                    <div class="header__left">
                        <button type="button" class="header__menu-btn" aria-label="Открыть меню" onclick="toggleMobileSidebar()">☰</button>
                    </div>
                    <div class="header__center">
                        <h1 class="header__title">Группы</h1>
                    </div>
                    <div class="header__right">
                        <!-- Пустое место для будущих элементов -->
                    </div>
                </div>
            </header>

            <!-- Main content -->
            <main class="main">
                <div class="main__header">
                    <h1 class="main__title">Группы</h1>
                    <p class="main__subtitle">Управление группами ВКонтакте для публикации контента. Выберите группы, в которые хотите постить.</p>
                </div>

                <!-- Load Groups Card -->
                <div class="card">
                    <div class="card__header">
                        <h2 class="card__title">Загрузка групп</h2>
                    </div>
                    <div class="card__content">
                        <p style="margin-bottom: 16px; color: #818c99;">Загрузите список ваших групп ВКонтакте, где у вас есть права администратора.</p>
                        <button id="loadGroupsBtn" class="btn btn--primary">
                            📥 Загрузить мои группы
                        </button>
                        <div id="loadResult" class="result"></div>
                    </div>
                </div>

                <!-- Selected Count -->
                <div id="selectedCount" class="selected-count" style="display: none;">
                    Выбрано групп: <strong>0</strong>
                </div>

                <!-- Groups Grid -->
                <div id="groupsContainer" class="groups-grid"></div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button id="saveBtn" class="btn btn--primary" style="display: none;">
                        💾 Сохранить выбранные группы
                    </button>
                    
                    <button id="getGroupTokensBtn" class="btn btn--secondary" style="display: none;">
                        🔑 Получить токены для групп
                    </button>
                </div>
            </main>
        </div>
    </div>

    <!-- Общие скрипты -->
    <script src="../js/utils.js"></script>
    <script src="../js/layout.js?v=20260422-1"></script>
    <script src="../js/sidebar.js?v=20260422-4"></script>
    <script src="../js/groups.js"></script>
</body>
</html>
