<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Группы - VK ZooPlatforma</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
    
    <!-- Общие стили VKUI -->
    <link rel="stylesheet" href="../css/vkui-base.css?v=20260422-2">
    
    <!-- Дополнительные стили для страницы групп -->
    <style>
        .groups-list {
            margin-top: 24px;
            border: 1px solid #e7e8ec;
            border-radius: 12px;
            overflow: hidden;
            background: #ffffff;
        }

        .groups-list table {
            width: 100%;
            border-collapse: collapse;
        }

        .groups-list th,
        .groups-list td {
            padding: 12px 14px;
            border-bottom: 1px solid #f0f2f5;
            vertical-align: middle;
            text-align: left;
            font-size: 14px;
        }

        .groups-list th {
            font-weight: 600;
            color: #5d6b7a;
            background: #fafbfc;
        }

        .groups-list tr:last-child td {
            border-bottom: none;
        }

        .group-main {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .group-photo {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background: #eef1f4;
            flex-shrink: 0;
        }

        .group-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .group-name {
            font-weight: 600;
            color: #1f2328;
            line-height: 1.2;
        }

        .group-screen {
            color: #818c99;
            font-size: 12px;
        }

        .status-chip {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 10px;
            font-size: 12px;
            line-height: 20px;
        }

        .status-chip--ok { background: #e6f8ed; color: #1f8f4d; }
        .status-chip--error { background: #fdebec; color: #b42318; }
        .status-chip--unknown { background: #eef1f4; color: #5d6b7a; }
        
        .selected-count {
            background: #5181b8;
            color: white;
            padding: 16px 20px;
            border-radius: 8px;
            text-align: center;
            margin: 24px 0;
            font-size: 14px;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <div data-sidebar-root></div>

        <!-- Content -->
        <div class="content panel">
            <!-- Header -->
            <header class="header">
                <div class="header__content">
                    <div class="header__left">
                        <button type="button" class="header__menu-btn" aria-label="Открыть меню" onclick="toggleMobileSidebar()">☰</button>
                    </div>
                    <div class="header__center">
                        <h1 class="header__title">Группы</h1>
                    </div>
                    <div class="header__right">
                        <!-- Пустое место для будущих элементов -->
                    </div>
                </div>
            </header>

            <!-- Main content -->
            <main class="main">
                <div class="main__header">
                    <h1 class="main__title">Группы</h1>
                    <p class="main__subtitle">Список сообществ, которые установили приложение.</p>
                </div>

                <!-- Load Groups Card -->
                <div class="card">
                    <div class="card__header">
                        <h2 class="card__title">Установившие приложение</h2>
                    </div>
                    <div class="card__content">
                        <p style="margin-bottom: 16px; color: #818c99;">Загрузите список групп, в которых приложение уже установлено и зафиксировано в системе.</p>
                        <div class="action-buttons" style="margin-top: 0;">
                            <button id="loadGroupsBtn" class="btn btn--primary">🔄 Обновить список</button>
                            <button id="checkAllGroupsBtn" class="btn btn--secondary">🩺 Проверить все группы</button>
                        </div>
                        <div id="loadResult" class="result"></div>
                    </div>
                </div>

                <!-- Selected Count -->
                <div id="selectedCount" class="selected-count" style="display: none;">
                    Найдено групп: <strong>0</strong>
                </div>

                <!-- Groups List -->
                <div id="groupsContainer" class="groups-list"></div>
            </main>
        </div>
    </div>

    <!-- Общие скрипты -->
    <script src="../js/utils.js"></script>
    <script src="../js/layout.js?v=20260422-1"></script>
    <script src="../js/sidebar.js?v=20260422-4"></script>
    <script src="../js/groups.js"></script>
</body>
</html>
