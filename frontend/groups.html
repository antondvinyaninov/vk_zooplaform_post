<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление группами</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
    <link rel="stylesheet" href="style.css">
    <style>
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .group-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .group-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .group-card.selected {
            border-color: #667eea;
            background: #f0f3ff;
        }
        
        .group-card.selected::after {
            content: "✓";
            position: absolute;
            top: 10px;
            right: 10px;
            background: #667eea;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .group-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: block;
        }
        
        .group-name {
            font-weight: 600;
            margin-bottom: 5px;
            text-align: center;
        }
        
        .group-info {
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        
        .selected-count {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }
        
        .nav-links {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .nav-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .nav-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Управление группами</h1>
        
        <div class="card">
            <div class="nav-links">
                <a href="index.html">← Назад к панели</a>
                <a href="auth.html">Авторизация</a>
            </div>
            
            <h2>Подключенные группы</h2>
            <p>Выберите группы, в которые хотите постить контент</p>
            
            <button id="loadGroupsBtn" class="btn">Загрузить мои группы</button>
            
            <div id="selectedCount" class="selected-count" style="display: none;">
                Выбрано групп: <strong>0</strong>
            </div>
            
            <div id="groupsContainer" class="groups-grid"></div>
            
            <div id="loadResult" class="result"></div>
            
            <button id="saveBtn" class="btn" style="display: none; margin-top: 20px;">
                Сохранить выбранные группы
            </button>
        </div>
    </div>

    <script src="groups.js"></script>
</body>
</html>
